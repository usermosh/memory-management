<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #4b147d 0%, #230b4d 50%, #1a3a6d 100%);
            min-height: 100vh; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: absolute; width: 80vw; height: 80vh;
            background: radial-gradient(circle at center, rgba(255,120,230,0.4) 0%, rgba(100,220,255,0.3) 40%, transparent 70%);
            filter: blur(100px); z-index: 0;
        }
        .content { text-align: center; z-index: 10; width: 100%; max-width: 800px; padding: 30px; }
        .logo { width: 82px; margin-bottom: 18px; filter: drop-shadow(0 0 14px rgba(255,255,255,0.45)); border-radius: 50%; }
        h1 {
            font-family: 'Archivo Black', sans-serif; font-size: clamp(2.5rem,7vw,5rem);
            text-transform: uppercase; line-height: 0.9; letter-spacing: -2px; margin-bottom: 40px;
            color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        h1 span { color: #00f2ff; text-shadow: 0 0 30px rgba(0,242,255,0.6); }
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .card-btn {
            background: rgba(255,255,255,0.12); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 28px; font-size: 1rem; font-weight: 700;
            font-family: 'Inter', sans-serif; border-radius: 20px; cursor: pointer;
            transition: all 0.3s ease; flex: 1; min-width: 250px; max-width: 320px;
            text-align: left; position: relative; text-decoration: none; display: block;
        }
        .card-btn::after {
            content: '↗'; position: absolute; top: 20px; right: 20px; font-size: 0.8rem;
            color: #00f2ff; background: rgba(0,0,0,0.2); width: 24px; height: 24px;
            display: inline-flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .card-btn:hover { background: rgba(255,255,255,0.2); border-color: #00f2ff; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,242,255,0.2); }
        .card-subtitle { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 6px; font-weight: 400; }
    </style>
</head>
<body>
<div class="content">
    <img src="aulogo.png" alt="Arellano University" class="logo">
    <h1>MEMORY<br><span>MANAGEMENT</span></h1>
    <div class="btn-group">
        <a class="card-btn" href="virtual-memory.html">
            Memory Allocation
            <div class="card-subtitle">Virtual memory & partition simulation</div>
        </a>
        <a class="card-btn" href="scheduling.html">
            Scheduling Algorithm
            <div class="card-subtitle">Preemptive & Non-Preemptive CPU scheduling</div>
        </a>
    </div>
</div>
</body>
</html>

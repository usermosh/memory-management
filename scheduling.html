<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; text-align: center;
            padding: 100px 20px 80px;
            background: radial-gradient(circle at 50% 0%, #3b117a 0%, #150833 45%, #0d0628 100%);
            color: #fff; min-height: 100vh; position: relative;
        }
        body::before {
            content: ''; position: fixed; top: 10%; left: 50%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,242,255,0.08) 0%, rgba(255,0,212,0.05) 40%, transparent 70%);
            transform: translateX(-50%); z-index: -1; pointer-events: none;
        }
        .top-menu {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
            padding: 8px 15px; border-radius: 50px; display: flex; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .top-menu button {
            text-decoration: none; color: rgba(255,255,255,0.6); font-weight: 700;
            padding: 8px 20px; border-radius: 40px; transition: 0.3s; font-size: 0.85rem;
            background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; width: auto; margin: 0;
        }
        .top-menu button.active { background: #00f2ff; color: #000; box-shadow: 0 0 15px rgba(0,242,255,0.6); }
        .back-button {
            position: fixed; bottom: 30px; left: 30px; padding: 12px 25px;
            font-weight: 700; background: rgba(255,255,255,0.08); color: white;
            border-radius: 100px; text-decoration: none; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; z-index: 1100; font-family: 'Inter', sans-serif;
        }
        .back-button:hover { background: #00f2ff; color: #000; }
        h2 { font-family: 'Archivo Black', sans-serif; font-size: clamp(2rem,6vw,3.5rem); margin-bottom: 40px; text-transform: uppercase; letter-spacing: -1px; }
        h3 { font-family: 'Archivo Black', sans-serif; margin: 50px 0 20px; color: #00f2ff; font-size: 1.4rem; text-transform: uppercase; }
        .form-section {
            margin: 20px auto; max-width: 850px; background: rgba(255,255,255,0.03);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); text-align: left;
        }
        .form-section label { font-weight: 700; color: rgba(255,255,255,0.8); font-size: 0.9rem; display: block; margin-bottom: 6px; margin-top: 18px; }
        select, input[type="number"] {
            padding: 14px 16px; width: 100%; font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            background: rgba(0,0,0,0.35); color: white; font-weight: 600; outline: none; font-family: 'Inter', sans-serif;
            appearance: none; -webkit-appearance: none;
        }
        select option { background: #1a0840; }
        .run-btn {
            background: #00f2ff; color: #000; border: none; cursor: pointer;
            font-weight: 800; text-transform: uppercase; margin-top: 30px;
            padding: 16px; border-radius: 15px; width: 100%; font-size: 0.95rem;
            box-shadow: 0 5px 20px rgba(0,242,255,0.3); transition: 0.3s; font-family: 'Inter', sans-serif;
        }
        .run-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .process-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .process-card {
            padding: 20px; border-top: 3px solid #00f2ff;
            background: rgba(255,255,255,0.03); border-radius: 15px;
        }
        .process-card strong { color: #00f2ff; display: block; margin-bottom: 12px; font-size: 0.95rem; }
        .process-card label { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 10px; display: block; }
        .process-card input { margin-top: 4px; }
        #quantum-field { margin-top: 16px; }
        .table-wrapper { overflow-x: auto; max-width: 850px; margin: 0 auto; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; color: #fff; }
        th { padding: 18px; color: #00f2ff; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        .gantt-wrap { max-width: 850px; margin: 0 auto; background: rgba(0,0,0,0.3); padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; }
        .gantt-row { display: flex; align-items: stretch; }
        .gantt-block {
            height: 55px; margin-right: 4px; display: flex; align-items: center;
            justify-content: center; color: #000; font-weight: 800; border-radius: 8px; font-size: 0.85rem;
            background: linear-gradient(135deg, #00f2ff, #a855f7); flex-shrink: 0;
        }
        .gantt-times { display: flex; margin-top: 8px; }
        .gantt-time { font-weight: 700; color: #00f2ff; font-size: 0.8rem; text-align: left; flex-shrink: 0; }
        .avg-container {
            background: rgba(0,242,255,0.1); padding: 22px 50px; border-radius: 100px;
            display: inline-block; margin-top: 40px; margin-bottom: 20px; border: 1px solid rgba(0,242,255,0.2);
        }
        .avg-container h4 { font-size: 1.05rem; }
        .avg-container span { color: #00f2ff; }
        #results { max-width: 850px; margin: 0 auto; }
        .tab-indicator { width: 6px; height: 6px; border-radius: 50%; background: #00f2ff; display: inline-block; margin-right: 6px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="top-menu">
    <button id="tab-preemptive" class="active" onclick="switchTab('preemptive')">Preemptive</button>
    <button id="tab-nonpreemptive" onclick="switchTab('nonpreemptive')">Non-Preemptive</button>
</div>

<a href="index.html" class="back-button">← BACK</a>

<h2>CPU SCHEDULING</h2>

<div class="form-section">
    <label>Select Algorithm:</label>
    <select id="algorithm" onchange="buildProcessCards()">
        <option value="SRTF">SRTF (Preemptive)</option>
        <option value="PRIORITY_PRE">Priority (Preemptive)</option>
        <option value="RR">Round Robin</option>
    </select>

    <div id="quantum-field" style="display:none;">
        <label>Time Quantum:</label>
        <input type="number" id="time_quantum" min="1" placeholder="e.g. 2">
    </div>

    <label>Number of Processes:</label>
    <input type="number" id="num_process" min="1" max="20" placeholder="Enter number of processes (max 20)" onchange="buildProcessCards()">

    <div id="process-container" class="process-grid"></div>

    <button class="run-btn" onclick="runScheduling()">▶ Run Scheduling</button>
</div>

<div id="results"></div>

<script>
// ── Tab switching ───────────────────────────────────────────────────────────
const PREEMPTIVE_ALGOS = ['SRTF','PRIORITY_PRE','RR'];
const NONPREEMPTIVE_ALGOS = ['FCFS','SJF','PRIORITY_NP'];

function switchTab(tab) {
    const algoSelect = document.getElementById('algorithm');
    algoSelect.innerHTML = '';
    document.getElementById('tab-preemptive').classList.remove('active');
    document.getElementById('tab-nonpreemptive').classList.remove('active');
    document.getElementById('results').innerHTML = '';

    if (tab === 'preemptive') {
        document.getElementById('tab-preemptive').classList.add('active');
        algoSelect.innerHTML = `
            <option value="SRTF">SRTF (Preemptive)</option>
            <option value="PRIORITY_PRE">Priority (Preemptive)</option>
            <option value="RR">Round Robin</option>`;
    } else {
        document.getElementById('tab-nonpreemptive').classList.add('active');
        algoSelect.innerHTML = `
            <option value="FCFS">FCFS</option>
            <option value="SJF">SJF (Non-Preemptive)</option>
            <option value="PRIORITY_NP">Priority (Non-Preemptive)</option>`;
    }
    document.getElementById('process-container').innerHTML = '';
    document.getElementById('num_process').value = '';
    document.getElementById('quantum-field').style.display = 'none';
}

function buildProcessCards() {
    const num = parseInt(document.getElementById('num_process').value);
    const algo = document.getElementById('algorithm').value;
    const container = document.getElementById('process-container');
    const qf = document.getElementById('quantum-field');

    qf.style.display = algo === 'RR' ? 'block' : 'none';

    if (!num || num < 1) { container.innerHTML = ''; return; }
    if (num > 20) { alert('Maximum 20 processes.'); document.getElementById('num_process').value = 20; return; }

    const needPriority = algo === 'PRIORITY_PRE' || algo === 'PRIORITY_NP';
    container.innerHTML = '';
    for (let i = 1; i <= num; i++) {
        const card = document.createElement('div');
        card.className = 'process-card';
        card.innerHTML = `
            <strong>Process P${i}</strong>
            <label>Arrival Time</label>
            <input type="number" id="at_${i}" min="0" placeholder="0">
            <label>Burst Time</label>
            <input type="number" id="bt_${i}" min="1" placeholder="1">
            ${needPriority ? `<label>Priority (lower = higher)</label><input type="number" id="pr_${i}" min="1" placeholder="1">` : ''}
        `;
        container.appendChild(card);
    }
}

// ── Scheduling logic ────────────────────────────────────────────────────────
function getProcesses(num, algo) {
    const ps = [];
    const needPriority = algo === 'PRIORITY_PRE' || algo === 'PRIORITY_NP';
    for (let i = 1; i <= num; i++) {
        const at = parseInt(document.getElementById(`at_${i}`).value) || 0;
        const bt = parseInt(document.getElementById(`bt_${i}`).value) || 1;
        const pr = needPriority ? (parseInt(document.getElementById(`pr_${i}`).value) || 1) : 0;
        ps.push({ id: `P${i}`, arrival: at, burst: bt, remaining: bt, priority: pr, completion: null, tat: null, wt: null });
    }
    return ps;
}

function runScheduling() {
    const num = parseInt(document.getElementById('num_process').value);
    const algo = document.getElementById('algorithm').value;
    if (!num || num < 1) { alert('Please set the number of processes first.'); return; }

    const processes = getProcesses(num, algo);
    let gantt = [];

    if (algo === 'FCFS' || algo === 'SJF' || algo === 'PRIORITY_NP') {
        gantt = runNonPreemptive(processes, algo);
    } else if (algo === 'SRTF' || algo === 'PRIORITY_PRE') {
        gantt = runPreemptive(processes, algo);
    } else if (algo === 'RR') {
        const tq = parseInt(document.getElementById('time_quantum').value);
        if (!tq || tq < 1) { alert('Please enter a valid time quantum.'); return; }
        gantt = runRoundRobin(processes, tq);
    }

    renderResults(processes, gantt, algo, num);
}

function runNonPreemptive(processes, algo) {
    processes.sort((a, b) => a.arrival - b.arrival);
    let time = 0, completed = 0, gantt = [];
    const n = processes.length;

    while (completed < n) {
        let idx = -1;
        if (algo === 'FCFS') {
            for (let i = 0; i < n; i++) {
                if (processes[i].arrival <= time && processes[i].completion === null) { idx = i; break; }
            }
        } else if (algo === 'SJF') {
            let min = Infinity;
            for (let i = 0; i < n; i++) {
                if (processes[i].arrival <= time && processes[i].completion === null && processes[i].burst < min) {
                    min = processes[i].burst; idx = i;
                }
            }
        } else if (algo === 'PRIORITY_NP') {
            let min = Infinity;
            for (let i = 0; i < n; i++) {
                if (processes[i].arrival <= time && processes[i].completion === null && processes[i].priority < min) {
                    min = processes[i].priority; idx = i;
                }
            }
        }

        if (idx !== -1) {
            const p = processes[idx];
            if (time < p.arrival) time = p.arrival;
            gantt.push({ id: p.id, start: time, duration: p.burst });
            p.completion = time + p.burst;
            p.tat = p.completion - p.arrival;
            p.wt = p.tat - p.burst;
            time = p.completion; completed++;
        } else { time++; }
    }
    return gantt;
}

function runPreemptive(processes, algo) {
    const n = processes.length;
    let time = 0, completed = 0, gantt = [];
    const remaining = processes.map(p => p.burst);

    while (completed < n) {
        let idx = -1, minVal = Infinity;
        for (let i = 0; i < n; i++) {
            if (processes[i].arrival <= time && remaining[i] > 0) {
                const val = algo === 'SRTF' ? remaining[i] : processes[i].priority;
                if (val < minVal) { minVal = val; idx = i; }
            }
        }
        if (idx !== -1) {
            gantt.push({ id: processes[idx].id, start: time });
            remaining[idx]--;
            time++;
            if (remaining[idx] === 0) {
                processes[idx].completion = time;
                processes[idx].tat = time - processes[idx].arrival;
                processes[idx].wt = processes[idx].tat - processes[idx].burst;
                completed++;
            }
        } else { time++; }
    }

    // Merge consecutive same-id gantt blocks
    const merged = [];
    for (const g of gantt) {
        if (merged.length && merged[merged.length-1].id === g.id) {
            merged[merged.length-1].duration++;
        } else {
            merged.push({ id: g.id, start: g.start, duration: 1 });
        }
    }
    return merged;
}

function runRoundRobin(processes, tq) {
    const n = processes.length;
    processes.sort((a, b) => a.arrival - b.arrival);
    const remaining = processes.map(p => p.burst);
    let time = 0, completed = 0, gantt = [];
    const queue = [], visited = new Array(n).fill(false);

    while (completed < n) {
        for (let i = 0; i < n; i++) if (processes[i].arrival <= time && !visited[i]) { queue.push(i); visited[i] = true; }
        if (!queue.length) { time++; continue; }
        const idx = queue.shift();
        const start = time;
        const run = Math.min(tq, remaining[idx]);
        for (let t = 0; t < run; t++) {
            time++; remaining[idx]--;
            for (let j = 0; j < n; j++) if (processes[j].arrival <= time && !visited[j]) { queue.push(j); visited[j] = true; }
        }
        gantt.push({ id: processes[idx].id, start, duration: run });
        if (remaining[idx] > 0) { queue.push(idx); }
        else {
            processes[idx].completion = time;
            processes[idx].tat = time - processes[idx].arrival;
            processes[idx].wt = processes[idx].tat - processes[idx].burst;
            completed++;
        }
    }
    return gantt;
}

// ── Rendering ────────────────────────────────────────────────────────────────
function renderResults(processes, gantt, algo, num) {
    const needPriority = algo === 'PRIORITY_PRE' || algo === 'PRIORITY_NP';
    const PX_PER_UNIT = 42;
    let html = '';

    // Table
    html += `<h3>Process Table</h3>
    <div class="table-wrapper"><table>
    <tr><th>Process</th><th>Arrival</th><th>Burst</th>${needPriority ? '<th>Priority</th>' : ''}
    <th>Completion</th><th>Turnaround</th><th>Waiting</th></tr>`;
    let totalTat = 0, totalWt = 0;
    for (const p of processes) {
        html += `<tr><td><strong>${p.id}</strong></td><td>${p.arrival}</td><td>${p.burst}</td>
        ${needPriority ? `<td>${p.priority}</td>` : ''}
        <td>${p.completion}</td><td>${p.tat}</td><td>${p.wt}</td></tr>`;
        totalTat += p.tat; totalWt += p.wt;
    }
    html += `</table></div>`;

    // Gantt chart
    html += `<h3>Gantt Chart</h3><div class="gantt-wrap"><div class="gantt-row">`;
    for (const b of gantt) {
        const w = Math.max(b.duration * PX_PER_UNIT, 40);
        html += `<div class="gantt-block" style="width:${w}px;min-width:${w}px">${b.id}</div>`;
    }
    html += `</div><div class="gantt-times">`;
    for (const b of gantt) {
        const w = Math.max(b.duration * PX_PER_UNIT, 40);
        html += `<div class="gantt-time" style="width:${w}px;min-width:${w}px">${b.start}</div>`;
    }
    if (gantt.length) {
        const last = gantt[gantt.length-1];
        html += `<div class="gantt-time">${last.start + last.duration}</div>`;
    }
    html += `</div></div>`;

    // Averages
    html += `<div class="avg-container"><h4>Avg TAT: <span>${(totalTat/num).toFixed(2)}</span> &nbsp;|&nbsp; Avg WT: <span>${(totalWt/num).toFixed(2)}</span></h4></div>`;

    document.getElementById('results').innerHTML = html;
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
